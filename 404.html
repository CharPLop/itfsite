<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagina non trovata — Dott.ssa Ilenia Tagliaferro</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --lilla-dark:#2E2240; --lilla-primary:#48365A; --lilla-mid:#654E78;
  --lilla-light:#8E76A4; --lilla-pale:#B5A3C7; --lavanda:#D8CEE4;
  --blush:#F5F0F8; --warm-white:#FDFBFF;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Outfit','Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--warm-white);color:var(--lilla-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
.container{max-width:480px}
.code{font-family:var(--serif);font-size:clamp(5rem,12vw,8rem);font-weight:400;color:var(--lavanda);line-height:1;margin-bottom:16px}
h1{font-family:var(--serif);font-size:clamp(1.4rem,3vw,1.8rem);font-weight:400;color:var(--lilla-primary);margin-bottom:12px}
p{font-size:1rem;color:var(--lilla-light);line-height:1.7;margin-bottom:32px}
a.btn{display:inline-block;padding:14px 36px;border-radius:50px;background:var(--lilla-primary);color:var(--blush);text-decoration:none;font-weight:600;font-size:.9rem;transition:all .3s}
a.btn:hover{background:var(--lilla-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(72,54,90,.25)}
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Pagina non trovata</h1>
  <p>La pagina che stai cercando non esiste o è stata spostata. Torna alla home per scoprire i servizi della Dott.ssa Tagliaferro.</p>
  <a href="/" class="btn">Torna alla Home</a>
</div>
</body>
</html>
